AWSTemplateFormatVersion: '2010-09-09'
Description: houseiq-backend

Transform:
  - AWS::Serverless-2016-10-31

Globals:
  Function:
    Runtime: nodejs20.x
    Architectures:
      - x86_64
    MemorySize: 512
    Timeout: 30
    LoggingConfig:
      LogFormat: JSON

Resources:
  HouseIQApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: houseiq-api
      StageName: Prod
      Cors:
        AllowMethods: "'POST,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"

  HouseIQTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: HouseIQ
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  AnalyzePropertyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: houseiq-analyze-property
      Handler: src/handlers/analyzeProperty.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref HouseIQTable
      Environment:
        Variables:
          TABLE_NAME: !Ref HouseIQTable
          RENTCAST_API_KEY: '{{resolve:ssm:/houseiq/rentcast-api-key}}'
      Events:
        AnalyzePropertyApi:
          Type: Api
          Properties:
            RestApiId: !Ref HouseIQApi
            Path: /property/analyze
            Method: POST

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL for Prod stage
    Value: !Sub "https://${HouseIQApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"